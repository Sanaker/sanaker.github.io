            <img class="Bilder" src="elo.png" width="100%" />
            <script>
                var slideIndex = 0;
                window.onload = Slideshow();

                function Slideshow() {
                    var i;
                    //Gjør bilde usynlig
                    var x = document.getElementsByClassName("Bilder");
                    for (i = 0; i < x.length; i++) {
                        x[i].style.display = "none";
                    }
                    //Gjør bilde synlig
                    slideIndex++;
                    if (slideIndex > x.length) {
                        slideIndex = 1;
                    }
                    x[slideIndex - 1].style.display = "block";
                    setTimeout(Slideshow, 0.000001); //Bytter bilde hvert 5 sekund
                }
            </script>
